<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🌌 Aurora Visibility Platform</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Aurora Visibility Platform</h1>

<!-- MAP -->
<div id="map"></div>

<!-- VISIBILITY PANEL -->
<div class="panel">
<h2>Aurora Visibility Score</h2>

<p>Aurora Strength: <span id="aurora"></span></p>
<p>Visibility: <span id="visibility"></span></p>
<p>Darkness: <span id="darkness"></span></p>
<p>Photo Score: <span id="photo"></span></p>

<!-- LOCATION INPUT -->
<div class="locationBox">

<input type="text" id="locationInput" placeholder="Enter Location">

<button onclick="checkVisibility()">Check Visibility</button>

</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="script.js"></script>

</body>
</html>
