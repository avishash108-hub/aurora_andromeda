<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🌌 Aurora Visibility Platform</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="Header">
<h1>Aurora Visibility intelligence platform</h1>
<p>Real-time Aurora Prediction for photographers</p>
</header>

<div class="mainLayout">

<div class="panel">

<h2>Aurora Visibility Score</h2>

<p>Aurora Alert: <span id="alert"></span></p>
<p>Aurora probability: <span id="probab"></span></p>
<p>Aurora Strength: <span id="strength"></span></p>
<p>Visibility: <span id="visibility"></span></p>
<p>Darkness: <span id="darkness"></span></p>
<p>Photography score: <span id="photo"></span></p>

<div class="location-box">
<input type="text" id="locationInput" placeholder="Enter Location">
<button id="checkBtn">Check Visibility</button>
</div>

</div>

<div id="globeContainer" style="width:100%; height:600px;"></div>

</div>

<script src="https://unpkg.com/globe.gl"></script>

<script src="script.js" defer></script>

</body>
</html>

<script src="script.js"></script>

</body>
</html>
